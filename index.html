<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>5x5 ポリオミノソルバー</title>
    <style>
        :root {
            --bg-color: #1e1e24;
            --card-bg: #2a2a35;
            --text-color: #f5f5f7;
            --border-color: #444455;
            --color-0: #ef4444; /* ピース1: 赤 */
            --color-1: #3b82f6; /* ピース2: 青 */
            --color-2: #22c55e; /* ピース3: 緑 */
            --color-3: #eab308; /* ピース4: 黄 */
            --color-4: #a855f7; /* ピース5: 紫 */
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h2 { font-size: 1.2rem; margin-bottom: 6px; text-align: center; }
        .section {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        /* グリッド共通 */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            width: 100%;
            aspect-ratio: 1;
            margin: 0 auto;
            touch-action: none;
        }
        .cell {
            background-color: #3a3a4a;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            transition: background-color 0.1s;
        }
        /* エディタ用のスタイル */
        #editor .cell.active { background-color: #e2e8f0; }
        /* セレクター（ピース切り替え） */
        .selector {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }
        .p-btn {
            flex: 1;
            margin: 0 2px;
            padding: 8px 0;
            border: none;
            border-radius: 6px;
            background: #3a3a4a;
            color: #fff;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .p-btn.active {
            box-shadow: 0 0 0 3px #fff;
        }
        .p-btn:nth-child(1) { background-color: var(--color-0); }
        .p-btn:nth-child(2) { background-color: var(--color-1); }
        .p-btn:nth-child(3) { background-color: var(--color-2); }
        .p-btn:nth-child(4) { background-color: var(--color-3); }
        .p-btn:nth-child(5) { background-color: var(--color-4); }
        
        .status-text {
            text-align: center;
            font-size: 0.9rem;
            margin-top: 6px;
            color: #aaa;
        }
        /* オプション設定 */
        .option-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.95rem;
            padding: 4px 0;
        }
        .option-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        /* ボタン類 */
        .btn-group {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 360px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }
        .btn-solve { background-color: #2563eb; }
        .btn-clear { background-color: #dc2626; }
    </style>
</head>
<body>

    <h2>🧩 解答ボード (結果)</h2>
    <div class="section">
        <div id="result" class="grid"></div>
    </div>

    <div class="section">
        <div class="option-group">
            <input type="checkbox" id="allow-transform" checked>
            <label for="allow-transform">ピースの回転・反転を許可する</label>
        </div>
    </div>

    <h2>✍️ ピース入力 (なぞって描く)</h2>
    <div class="section">
        <div id="editor" class="grid"></div>
        <div class="selector">
            <button class="p-btn active" onclick="switchPiece(0)">P1</button>
            <button class="p-btn" onclick="switchPiece(1)">P2</button>
            <button class="p-btn" onclick="switchPiece(2)">P3</button>
            <button class="p-btn" onclick="switchPiece(3)">P4</button>
            <button class="p-btn" onclick="switchPiece(4)">P5</button>
        </div>
        <div id="status" class="status-text">ピース1: 0マス (目標: 5マス)</div>
    </div>

    <div class="btn-group">
        <button class="btn btn-clear" onclick="clearAllPieces()">全消去</button>
        <button class="btn btn-solve" onclick="solvePuzzle()">解く！</button>
    </div>

    <script>
        let piecesData = Array.from({length: 5}, () => Array(25).fill(false));
        let currentPieceIdx = 0;
        
        let isDrawing = false;
        let drawMode = true; 
        let lastTargetIndex = null;

        const colors = ['var(--color-0)', 'var(--color-1)', 'var(--color-2)', 'var(--color-3)', 'var(--color-4)'];

        function init() {
            const resultBoard = document.getElementById('result');
            const editorBoard = document.getElementById('editor');
            
            resultBoard.innerHTML = '';
            editorBoard.innerHTML = '';

            for (let i = 0; i < 25; i++) {
                const rCell = document.createElement('div');
                rCell.className = 'cell';
                rCell.id = `r-${i}`;
                resultBoard.appendChild(rCell);

                const eCell = document.createElement('div');
                eCell.className = 'cell';
                eCell.dataset.index = i;
                editorBoard.appendChild(eCell);
            }
            updateEditorUI();
            setupPointerEvents();
        }

        function setupPointerEvents() {
            const editor = document.getElementById('editor');

            editor.addEventListener('pointerdown', (e) => {
                const cell = e.target.closest('#editor .cell');
                if (!cell) return;
                isDrawing = true;
                const idx = parseInt(cell.dataset.index);
                drawMode = !piecesData[currentPieceIdx][idx];
                lastTargetIndex = idx;
                toggleCell(idx, drawMode);
                cell.releasePointerCapture(e.pointerId);
            });

            editor.addEventListener('pointermove', (e) => {
                if (!isDrawing) return;
                const target = document.elementFromPoint(e.clientX, e.clientY);
                if (!target) return;
                const cell = target.closest('#editor .cell');
                if (!cell) return;
                const idx = parseInt(cell.dataset.index);
                
                if (idx !== lastTargetIndex) {
                    lastTargetIndex = idx;
                    toggleCell(idx, drawMode);
                }
            });

            const stopDrawing = () => { isDrawing = false; lastTargetIndex = null; };
            window.addEventListener('pointerup', stopDrawing);
            window.addEventListener('pointercancel', stopDrawing);
        }

        function toggleCell(idx, mode) {
            piecesData[currentPieceIdx][idx] = mode;
            updateEditorUI();
        }

        function updateEditorUI() {
            const cells = document.querySelectorAll('#editor .cell');
            const currentData = piecesData[currentPieceIdx];
            let count = 0;

            cells.forEach((cell, idx) => {
                if (currentData[idx]) {
                    cell.classList.add('active');
                    cell.style.backgroundColor = colors[currentPieceIdx];
                } else {
                    cell.classList.remove('active');
                    cell.style.backgroundColor = '';
                }
            });

            currentData.forEach(v => { if(v) count++; });
            document.getElementById('status').innerText = `ピース${currentPieceIdx + 1}: ${count}マス (目標: 5マス)`;
        }

        function switchPiece(idx) {
            currentPieceIdx = idx;
            document.querySelectorAll('.p-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === idx);
            });
            updateEditorUI();
        }

        // 【変更】確認ダイアログ（confirm）を削除して一瞬で消去
        function clearAllPieces() {
            piecesData = Array.from({length: 5}, () => Array(25).fill(false));
            updateEditorUI();
            for (let i = 0; i < 25; i++) {
                document.getElementById(`r-${i}`).style.backgroundColor = '';
            }
        }

        function generateVariants(coords, allowTransform) {
            const variants = new Set();
            const transforms = allowTransform ? [
                (x, y) => [x, y],       (x, y) => [-y, x],    (x, y) => [-x, -y],   (x, y) => [y, -x],
                (x, y) => [-x, y],      (x, y) => [y, x],     (x, y) => [x, -y],    (x, y) => [-y, -x]
            ] : [
                (x, y) => [x, y]
            ];

            for (const t of transforms) {
                let trans = coords.map(([x, y]) => t(x, y));
                let minY = Math.min(...trans.map(c => c[1]));
                let minX = Math.min(...trans.filter(c => c[1] === minY).map(c => c[0]));
                
                let norm = trans.map(([x, y]) => [x - minX, y - minY]);
                norm.sort((a, b) => a[1] !== b[1] ? a[1] - b[1] : a[0] - b[0]);
                
                variants.add(norm.map(([x, y]) => `${x},${y}`).join(';'));
            }
            return Array.from(variants).map(str => str.split(';').map(c => c.split(',').map(Number)));
        }

        function solvePuzzle() {
            let totalCells = 0;
            const formattedPieces = [];
            const allowTransform = document.getElementById('allow-transform').checked;

            for (let i = 0; i < 5; i++) {
                const coords = [];
                for (let j = 0; j < 25; j++) {
                    if (piecesData[i][j]) coords.push([j % 5, Math.floor(j / 5)]);
                }
                if (coords.length === 0) {
                    alert(`ピース ${i + 1} が白紙です！`);
                    return;
                }
                totalCells += coords.length;
                formattedPieces.push({ variants: generateVariants(coords, allowTransform) });
            }

            if (totalCells !== 25) {
                alert(`マスの総数が ${totalCells} 個です。5x5=25マスぴったりにしてください！`);
                return;
            }

            const board = Array(25).fill(-1);
            const used = Array(5).fill(false);
            
            function backtrack(index) {
                if (index === 25) return true;
                if (board[index] !== -1) return backtrack(index + 1);

                const r = Math.floor(index / 5);
                const c = index % 5;

                for (let p = 0; p < 5; p++) {
                    if (used[p]) continue;
                    used[p] = true;

                    for (const variant of formattedPieces[p].variants) {
                        let canPlace = true;
                        for (const [dx, dy] of variant) {
                            const nr = r + dy;
                            const nc = c + dx;
                            if (nr < 0 || nr >= 5 || nc < 0 || nc >= 5 || board[nr * 5 + nc] !== -1) {
                                canPlace = false;
                                break;
                            }
                        }

                        if (canPlace) {
                            for (const [dx, dy] of variant) board[(r + dy) * 5 + (c + dx)] = p;
                            if (backtrack(index + 1)) return true;
                            for (const [dx, dy] of variant) board[(r + dy) * 5 + (c + dx)] = -1;
                        }
                    }
                    used[p] = false;
                }
                return false;
            }

            if (backtrack(0)) {
                for (let i = 0; i < 25; i++) {
                    const pIdx = board[i];
                    document.getElementById(`r-${i}`).style.backgroundColor = colors[pIdx];
                }
            } else {
                alert("解が見つかりませんでした！ピースの向きや形を確認してください。");
            }
        }

        window.onload = init;
    </script>
</body>
</html>
