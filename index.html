<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TA特化型 ポリオミノソルバー</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a24;
            --text-color: #f5f5f7;
            --border-color: #3a3a4a;
            --color-0: #ef4444; /* P1: 赤 */
            --color-1: #3b82f6; /* P2: 青 */
            --color-2: #22c55e; /* P3: 緑 */
            --color-3: #eab308; /* P4: 黄 */
            --color-4: #a855f7; /* P5: 紫 */
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        
        /* 画面全体をスクロール禁止にし、タイトに配置 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* スクロールを完全に禁止 */
        }
        
        h2 { 
            font-size: 0.9rem; 
            margin: 2px 0; 
            text-align: center; 
            width: 100%; 
            max-width: 360px; 
            color: #aaa;
        }
        
        .section {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 6px;
            margin-bottom: 4px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
        }
        
        /* 【重要】メイン盤面を180pxにギュッと縮小 */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 3px;
            width: 100%;
            max-width: 170px;
            aspect-ratio: 1;
            margin: 0 auto;
            touch-action: none;
        }
        .cell {
            background-color: #262632;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1rem;
            color: #ffffff;
            min-width: 0;
            min-height: 0;
        }
        .cell.target-num {
            background-color: #4b5563;
            border-color: #9ca3af;
            text-shadow: 0 0 5px #fff;
        }
        
        /* 5ピースコンテナ（サイズは極力維持） */
        .pieces-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px 6px;
            width: 100%;
        }
        .piece-block {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .piece-label {
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 2px;
        }
        .mini-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 2px;
            width: 100%;
            aspect-ratio: 1;
        }
        .m-cell {
            background-color: #22222a;
            border: 1px solid #333344;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
            color: #fff;
            min-width: 0;
            min-height: 0;
        }
        .p0-active { background-color: var(--color-0); }
        .p1-active { background-color: var(--color-1); }
        .p2-active { background-color: var(--color-2); }
        .p3-active { background-color: var(--color-3); }
        .p4-active { background-color: var(--color-4); }
        
        .m-cell.hit {
            background-color: #ffffff !important;
            color: #000000 !important;
            box-shadow: 0 0 12px #ffffff;
            font-size: 1.1rem;
            animation: pulse 1s infinite alternate;
            line-height: 1;
        }
        @keyframes pulse {
            from { box-shadow: 0 0 6px #fff; }
            to { box-shadow: 0 0 16px #fff, 0 0 25px #fff; }
        }

        /* オプションを最下部にコンパクトに配置 */
        .control-area {
            width: 100%;
            max-width: 360px;
            margin-top: 2px;
        }
        .option-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 4px;
        }
        .option-group input { width: 14px; height: 14px; }

        .btn-group { display: flex; gap: 6px; width: 100%; }
        .btn {
            flex: 1; padding: 8px; border: none; border-radius: 6px;
            font-size: 0.9rem; font-weight: bold; cursor: pointer; color: white;
        }
        .btn-solve { background-color: #2563eb; }
        .btn-clear { background-color: #dc2626; }
    </style>
</head>
<body>

    <h2>🏁 メイン盤面 (1〜5配置)</h2>
    <div class="section">
        <div id="main-board" class="grid"></div>
    </div>

    <h2>✍️ ピース入力 (実際の配置)</h2>
    <div class="section">
        <div id="pieces-wrapper"></div>
    </div>

    <div class="control-area">
        <div class="option-group">
            <input type="checkbox" id="allow-transform" checked>
            <label for="allow-transform">ピースの回転・反転を許可</label>
        </div>
        <div class="btn-group">
            <button class="btn btn-clear" onclick="clearAll()">全消去</button>
            <button class="btn btn-solve" onclick="solvePuzzle()">解く！</button>
        </div>
    </div>

    <script>
        let mainBoardData = Array(25).fill(0); 
        let piecesData = Array.from({length: 5}, () => Array(25).fill(false));
        
        let isDrawing = false;
        let drawMode = true;
        let activePieceIdx = null;
        let lastTargetIndex = null;

        const colors = ['var(--color-0)', 'var(--color-1)', 'var(--color-2)', 'var(--color-3)', 'var(--color-4)'];

        function init() {
            const mainBoard = document.getElementById('main-board');
            mainBoard.innerHTML = '';
            for(let i=0; i<25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('pointerdown', handleMainBoardTap);
                mainBoard.appendChild(cell);
            }

            const wrapper = document.getElementById('pieces-wrapper');
            wrapper.className = 'pieces-container';
            wrapper.innerHTML = '';

            const layout = [0, null, 4, 1, 2, 3];

            layout.forEach(p => {
                if (p === null) {
                    const emptyBlock = document.createElement('div');
                    wrapper.appendChild(emptyBlock);
                    return;
                }

                const block = document.createElement('div');
                block.className = 'piece-block';
                block.innerHTML = `<div class="piece-label" style="color:${colors[p]}">P${p+1}</div>`;
                
                const miniGrid = document.createElement('div');
                miniGrid.className = 'mini-grid';
                miniGrid.dataset.pieceIdx = p;

                for(let i=0; i<25; i++) {
                    const mCell = document.createElement('div');
                    mCell.className = 'm-cell';
                    mCell.dataset.cellIdx = i;
                    miniGrid.appendChild(mCell);
                }
                block.appendChild(miniGrid);
                wrapper.appendChild(block);
            });

            setupPointerEvents();
            updateUI();
        }

        function handleMainBoardTap(e) {
            const idx = parseInt(e.target.dataset.index);
            if (mainBoardData[idx] > 0) {
                mainBoardData[idx] = 0;
            } else {
                for (let num = 1; num <= 5; num++) {
                    if (!mainBoardData.includes(num)) {
                        mainBoardData[idx] = num;
                        break;
                    }
                }
            }
            updateUI();
        }

        function setupPointerEvents() {
            window.addEventListener('pointerdown', (e) => {
                const miniGrid = e.target.closest('.mini-grid');
                const mCell = e.target.closest('.m-cell');
                if (!miniGrid || !mCell) return;

                isDrawing = true;
                activePieceIdx = parseInt(miniGrid.dataset.pieceIdx);
                const cIdx = parseInt(mCell.dataset.cellIdx);
                
                drawMode = !piecesData[activePieceIdx][cIdx]; 
                lastTargetIndex = cIdx;
                
                piecesData[activePieceIdx][cIdx] = drawMode;
                updateUI();
                mCell.releasePointerCapture(e.pointerId);
            });

            window.addEventListener('pointermove', (e) => {
                if (!isDrawing || activePieceIdx === null) return;
                const target = document.elementFromPoint(e.clientX, e.clientY);
                if (!target) return;
                
                const miniGrid = target.closest('.mini-grid');
                const mCell = target.closest('.m-cell');
                if (!miniGrid || !mCell) return;
                if (parseInt(miniGrid.dataset.pieceIdx) !== activePieceIdx) return; 

                const cIdx = parseInt(mCell.dataset.cellIdx);
                if (cIdx !== lastTargetIndex) {
                    lastTargetIndex = cIdx;
                    piecesData[activePieceIdx][cIdx] = drawMode;
                    updateUI();
                }
            });

            const stopDrawing = () => { isDrawing = false; activePieceIdx = null; lastTargetIndex = null; };
            window.addEventListener('pointerup', stopDrawing);
            window.addEventListener('pointercancel', stopDrawing);
        }

        function updateUI() {
            const cells = document.querySelectorAll('#main-board .cell');
            cells.forEach((cell, i) => {
                const val = mainBoardData[i];
                cell.className = 'cell';
                if(val > 0) {
                    cell.classList.add('target-num');
                    cell.innerText = val;
                } else {
                    cell.innerText = '';
                }
            });

            for(let p=0; p<5; p++) {
                const mCells = document.querySelectorAll(`.mini-grid[data-piece-idx="${p}"] .m-cell`);
                mCells.forEach((cell, i) => {
                    if (!cell.classList.contains('hit')) {
                        cell.innerText = '';
                        cell.className = 'm-cell';
                    } else {
                        cell.className = 'm-cell hit';
                    }
                    if(piecesData[p][i]) {
                        cell.classList.add(`p${p}-active`);
                    }
                });
            }
        }

        function clearAll() {
            mainBoardData.fill(0);
            piecesData = Array.from({length: 5}, () => Array(25).fill(false));
            document.querySelectorAll('.m-cell').forEach(c => {
                c.classList.remove('hit');
                c.innerText = '';
            });
            updateUI();
        }

        function generateVariants(coords, allowTransform) {
            const variants = [];
            const transforms = allowTransform ? [
                (x, y) => [x, y],       (x, y) => [-y, x],    (x, y) => [-x, -y],   (x, y) => [y, -x],
                (x, y) => [-x, y],      (x, y) => [y, x],     (x, y) => [x, -y],    (x, y) => [-y, -x]
            ] : [(x, y) => [x, y]];

            for (let tIdx = 0; tIdx < transforms.length; tIdx++) {
                const t = transforms[tIdx];
                let trans = coords.map(({x, y, origIdx}) => {
                    const [nx, ny] = t(x, y);
                    return {x: nx, y: ny, origIdx};
                });
                
                let minY = Math.min(...trans.map(c => c.y));
                let minX = Math.min(...trans.filter(c => c.y === minY).map(c => c.x));
                
                let norm = trans.map(c => ({x: c.x - minX, y: c.y - minY, origIdx: c.origIdx}));
                norm.sort((a, b) => a.y !== b.y ? a.y - b.y : a.x - b.x);
                
                const key = norm.map(c => `${c.x},${c.y}`).join(';');
                if(!variants.some(v => v.key === key)) {
                    variants.push({ key, coords: norm });
                }
            }
            return variants;
        }

        function solvePuzzle() {
            document.querySelectorAll('.m-cell').forEach(c => {
                c.classList.remove('hit');
                c.innerText = '';
            });

            for(let num=1; num<=5; num++) {
                if(!mainBoardData.includes(num)) {
                    alert(`メイン盤面に数字の "${num}" が配置されていません！`);
                    return;
                }
            }

            let totalCells = 0;
            const formattedPieces = [];
            const allowTransform = document.getElementById('allow-transform').checked;

            for (let i = 0; i < 5; i++) {
                const coords = [];
                for (let j = 0; j < 25; j++) {
                    if (piecesData[i][j]) {
                        coords.push({ x: j % 5, y: Math.floor(j / 5), origIdx: j });
                    }
                }
                if (coords.length === 0) {
                    alert(`ピース P${i + 1} が未入力です！`);
                    return;
                }
                totalCells += coords.length;
                formattedPieces.push({ variants: generateVariants(coords, allowTransform) });
            }

            if (totalCells !== 25) {
                alert(`描かれたマスの総数が ${totalCells} 個です。5x5=25マスぴったりにしてください！`);
                return;
            }

            const board = Array(25).fill(-1);
            const used = Array(5).fill(false);
            let finalPlacement = Array(5); 

            function backtrack(index) {
                if (index === 25) return true;
                if (board[index] !== -1) return backtrack(index + 1);

                const r = Math.floor(index / 5);
                const c = index % 5;

                for (let p = 0; p < 5; p++) {
                    if (used[p]) continue;
                    used[p] = true;

                    for (const variant of formattedPieces[p].variants) {
                        let canPlace = true;
                        for (const pt of variant.coords) {
                            const nr = r + pt.y;
                            const nc = c + pt.x;
                            if (nr < 0 || nr >= 5 || nc < 0 || nc >= 5 || board[nr * 5 + nc] !== -1) {
                                canPlace = false;
                                break;
                            }
                        }

                        if (canPlace) {
                            for (const pt of variant.coords) board[(r + pt.y) * 5 + (c + pt.x)] = p;
                            finalPlacement[p] = { startR: r, startC: c, coords: variant.coords };

                            if (backtrack(index + 1)) return true;

                            for (const pt of variant.coords) board[(r + pt.y) * 5 + (c + pt.x)] = -1;
                        }
                    }
                    used[p] = false;
                }
                return false;
            }

            if (backtrack(0)) {
                for (let num = 1; num <= 5; num++) {
                    const boardIdx = mainBoardData.indexOf(num); 
                    const br = Math.floor(boardIdx / 5);
                    const bc = boardIdx % 5;
                    const pIdx = board[boardIdx]; 

                    const placement = finalPlacement[pIdx];
                    const matchedCoord = placement.coords.find(pt => {
                        return (placement.startR + pt.y === br) && (placement.startC + pt.x === bc);
                    });

                    if (matchedCoord) {
                        const origCellIdx = matchedCoord.origIdx;
                        const targetCell = document.querySelector(`.mini-grid[data-piece-idx="${pIdx}"] .m-cell[data-cell-idx="${origCellIdx}"]`);
                        if (targetCell) {
                            targetCell.classList.add('hit');
                            targetCell.innerText = num; 
                        }
                    }
                }
                updateUI();
            } else {
                alert("解が見つかりませんでした！ピースの形や向きを確認してください。");
            }
        }

        window.onload = init;
    </script>
</body>
</html>
