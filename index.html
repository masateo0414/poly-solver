<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TA特化型 横画面ソルバー</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a24;
            --text-color: #f5f5f7;
            --border-color: #3a3a4a;
            --color-0: #ef4444; /* P1: 赤 */
            --color-1: #3b82f6; /* P2: 青 */
            --color-2: #22c55e; /* P3: 緑 */
            --color-3: #eab308; /* P4: 黄 */
            --color-4: #a855f7; /* P5: 紫 */
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        
        /* 横画面専用：スクロールを完全に排除し、縦幅いっぱいに使う */
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 0 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* 縦幅を節約するため、最上部にすべてのコントロールを集約 (高さ12vh) */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 12vh;
            border-bottom: 1px solid #2a2a3a;
        }
        .logo { font-size: 0.9rem; font-weight: bold; color: #888; }
        .option-group { display: flex; align-items: center; gap: 4px; font-size: 0.75rem; color: #aaa; }
        .option-group input { width: 14px; height: 14px; }
        .btn-group { display: flex; gap: 6px; }
        .btn {
            padding: 4px 14px; border: none; border-radius: 6px;
            font-size: 0.85rem; font-weight: bold; cursor: pointer; color: white;
            height: 7vh; display: flex; align-items: center;
        }
        .btn-solve { background-color: #2563eb; }
        .btn-clear { background-color: #dc2626; }

        /* 【新レイアウト】3列×2行の等価コンテナ (高さ86vh) */
        .game-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 1vh 2vw;
            width: 100%;
            height: 86vh;
            padding: 1vh 0;
        }

        .board-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .board-label {
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 2px;
            height: 3vh;
        }

        /* 画面の高さ(vh)を基準に正方形を強制。絶対に縦にはみ出さないサイズ */
        .grid-5x5 {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 2px;
            height: 35vh;
            width: 35vh;
        }

        /* マスの共通設定 */
        .cell {
            background-color: #22222a;
            border: 1px solid #333344;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: bold;
            color: #fff;
            min-width: 0;
            min-height: 0;
        }

        /* メイン盤面のデフォルト背景 */
        .grid-main .cell {
            background-color: #262632;
            border-color: var(--border-color);
        }
        /* メイン盤面のターゲット数字 */
        .grid-main .cell.target-num {
            background-color: #4b5563;
            border-color: #9ca3af;
            text-shadow: 0 0 5px #fff;
            font-size: 1.1rem;
            font-weight: 900;
        }
        
        /* ピースアクティブ色 */
        .p0-active { background-color: var(--color-0); }
        .p1-active { background-color: var(--color-1); }
        .p2-active { background-color: var(--color-2); }
        .p3-active { background-color: var(--color-3); }
        .p4-active { background-color: var(--color-4); }
        
        /* 激光エフェクト（視認性UP） */
        .cell.hit {
            background-color: #ffffff !important;
            color: #000000 !important;
            box-shadow: 0 0 15px #ffffff;
            font-size: 1.3rem;
            font-weight: 900;
            animation: pulse 0.8s infinite alternate;
            line-height: 1;
        }
        @keyframes pulse {
            from { box-shadow: 0 0 6px #fff; }
            to { box-shadow: 0 0 20px #fff, 0 0 30px #fff; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="logo">🏁 TA COCKPIT</div>
        <div class="option-group">
            <input type="checkbox" id="allow-transform" checked>
            <label for="allow-transform">回転・反転許可</label>
        </div>
        <div class="btn-group">
            <button class="btn btn-clear" onclick="clearAll()">全消去</button>
            <button class="btn btn-solve" onclick="solvePuzzle()">解く！</button>
        </div>
    </div>

    <div class="game-container" id="game-container"></div>

    <script>
        let mainBoardData = Array(25).fill(0); 
        let piecesData = Array.from({length: 5}, () => Array(25).fill(false));
        
        let isDrawing = false;
        let drawMode = true;
        let activePieceIdx = null;
        let lastTargetIndex = null;

        const colors = ['var(--color-0)', 'var(--color-1)', 'var(--color-2)', 'var(--color-3)', 'var(--color-4)'];

        function init() {
            const container = document.getElementById('game-container');
            container.innerHTML = '';

            // 【天才の配置】 1行目: P1, メイン, P5 / 2行目: P2, P3, P4
            const layout = [
                { type: 'piece', idx: 0, label: 'P1 (赤)', color: 'var(--color-0)' },
                { type: 'main',  idx: null, label: '🏁 MAIN BOARD', color: '#fff' },
                { type: 'piece', idx: 4, label: 'P5 (紫)', color: 'var(--color-4)' },
                { type: 'piece', idx: 1, label: 'P2 (青)', color: 'var(--color-1)' },
                { type: 'piece', idx: 2, label: 'P3 (緑)', color: 'var(--color-2)' },
                { type: 'piece', idx: 3, label: 'P4 (黄)', color: 'var(--color-3)' }
            ];

            layout.forEach(item => {
                const block = document.createElement('div');
                block.className = 'board-block';
                block.innerHTML = `<div class="board-label" style="color:${item.color}">${item.label}</div>`;
                
                const grid = document.createElement('div');
                grid.className = 'grid-5x5';

                if (item.type === 'main') {
                    grid.classList.add('grid-main');
                    for(let i=0; i<25; i++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.dataset.index = i;
                        cell.addEventListener('pointerdown', handleMainBoardTap);
                        grid.appendChild(cell);
                    }
                } else {
                    grid.classList.add('grid-piece');
                    grid.dataset.pieceIdx = item.idx;
                    for(let i=0; i<25; i++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.dataset.cellIdx = i;
                        grid.appendChild(cell);
                    }
                }
                block.appendChild(grid);
                container.appendChild(block);
            });

            setupPointerEvents();
            updateUI();
        }

        function handleMainBoardTap(e) {
            const idx = parseInt(e.target.dataset.index);
            if (mainBoardData[idx] > 0) {
                mainBoardData[idx] = 0;
            } else {
                for (let num = 1; num <= 5; num++) {
                    if (!mainBoardData.includes(num)) {
                        mainBoardData[idx] = num;
                        break;
                    }
                }
            }
            updateUI();
        }

        function setupPointerEvents() {
            window.addEventListener('pointerdown', (e) => {
                const grid = e.target.closest('.grid-piece');
                const cell = e.target.closest('.grid-piece .cell');
                if (!grid || !cell) return;

                isDrawing = true;
                activePieceIdx = parseInt(grid.dataset.pieceIdx);
                const cIdx = parseInt(cell.dataset.cellIdx);
                
                drawMode = !piecesData[activePieceIdx][cIdx]; 
                lastTargetIndex = cIdx;
                
                piecesData[activePieceIdx][cIdx] = drawMode;
                updateUI();
                cell.releasePointerCapture(e.pointerId);
            });

            window.addEventListener('pointermove', (e) => {
                if (!isDrawing || activePieceIdx === null) return;
                const target = document.elementFromPoint(e.clientX, e.clientY);
                if (!target) return;
                
                const grid = target.closest('.grid-piece');
                const cell = target.closest('.grid-piece .cell');
                if (!grid || !cell) return;
                if (parseInt(grid.dataset.pieceIdx) !== activePieceIdx) return; 

                const cIdx = parseInt(cell.dataset.cellIdx);
                if (cIdx !== lastTargetIndex) {
                    lastTargetIndex = cIdx;
                    piecesData[activePieceIdx][cIdx] = drawMode;
                    updateUI();
                }
            });

            const stopDrawing = () => { isDrawing = false; activePieceIdx = null; lastTargetIndex = null; };
            window.addEventListener('pointerup', stopDrawing);
            window.addEventListener('pointercancel', stopDrawing);
        }

        function updateUI() {
            // メイン盤面
            const mCells = document.querySelectorAll('.grid-main .cell');
            mCells.forEach((cell, i) => {
                const val = mainBoardData[i];
                cell.className = 'cell';
                if(val > 0) {
                    cell.classList.add('target-num');
                    cell.innerText = val;
                } else {
                    cell.innerText = '';
                }
            });

            // ピース盤面
            for(let p=0; p<5; p++) {
                const pCells = document.querySelectorAll(`.grid-piece[data-piece-idx="${p}"] .cell`);
                pCells.forEach((cell, i) => {
                    if (!cell.classList.contains('hit')) {
                        cell.innerText = '';
                        cell.className = 'cell';
                    } else {
                        cell.className = 'cell hit';
                    }
                    if(piecesData[p][i]) {
                        cell.classList.add(`p${p}-active`);
                    }
                });
            }
        }

        function clearAll() {
            mainBoardData.fill(0);
            piecesData = Array.from({length: 5}, () => Array(25).fill(false));
            document.querySelectorAll('.cell').forEach(c => {
                c.classList.remove('hit');
                c.innerText = '';
            });
            updateUI();
        }

        function generateVariants(coords, allowTransform) {
            const variants = [];
            const transforms = allowTransform ? [
                (x, y) => [x, y],       (x, y) => [-y, x],    (x, y) => [-x, -y],   (x, y) => [y, -x],
                (x, y) => [-x, y],      (x, y) => [y, x],     (x, y) => [x, -y],    (x, y) => [-y, -x]
            ] : [(x, y) => [x, y]];

            for (let tIdx = 0; tIdx < transforms.length; tIdx++) {
                const t = transforms[tIdx];
                let trans = coords.map(({x, y, origIdx}) => {
                    const [nx, ny] = t(x, y);
                    return {x: nx, y: ny, origIdx};
                });
                
                let minY = Math.min(...trans.map(c => c.y));
                let minX = Math.min(...trans.filter(c => c.y === minY).map(c => c.x));
                
                let norm = trans.map(c => ({x: c.x - minX, y: c.y - minY, origIdx: c.origIdx}));
                norm.sort((a, b) => a.y !== b.y ? a.y - b.y : a.x - b.x);
                
                const key = norm.map(c => `${c.x},${c.y}`).join(';');
                if(!variants.some(v => v.key === key)) {
                    variants.push({ key, coords: norm });
                }
            }
            return variants;
        }

        function solvePuzzle() {
            document.querySelectorAll('.grid-piece .cell').forEach(c => {
                c.classList.remove('hit');
                c.innerText = '';
            });

            for(let num=1; num<=5; num++) {
                if(!mainBoardData.includes(num)) {
                    alert(`メイン盤面に数字の "${num}" が配置されていません！`);
                    return;
                }
            }

            let totalCells = 0;
            const formattedPieces = [];
            const allowTransform = document.getElementById('allow-transform').checked;

            for (let i = 0; i < 5; i++) {
                const coords = [];
                for (let j = 0; j < 25; j++) {
                    if (piecesData[i][j]) {
                        coords.push({ x: j % 5, y: Math.floor(j / 5), origIdx: j });
                    }
                }
                if (coords.length === 0) {
                    alert(`ピース P${i + 1} が未入力です！`);
                    return;
                }
                totalCells += coords.length;
                formattedPieces.push({ variants: generateVariants(coords, allowTransform) });
            }

            if (totalCells !== 25) {
                alert(`描かれたマスの総数が ${totalCells} 個です。5x5=25マスぴったりにしてください！`);
                return;
            }

            const board = Array(25).fill(-1);
            const used = Array(5).fill(false);
            let finalPlacement = Array(5); 

            function backtrack(index) {
                if (index === 25) return true;
                if (board[index] !== -1) return backtrack(index + 1);

                const r = Math.floor(index / 5);
                const c = index % 5;

                for (let p = 0; p < 5; p++) {
                    if (used[p]) continue;
                    used[p] = true;

                    for (const variant of formattedPieces[p].variants) {
                        let canPlace = true;
                        for (const pt of variant.coords) {
                            const nr = r + pt.y;
                            const nc = c + pt.x;
                            if (nr < 0 || nr >= 5 || nc < 0 || nc >= 5 || board[nr * 5 + nc] !== -1) {
                                canPlace = false;
                                break;
                            }
                        }

                        if (canPlace) {
                            for (const pt of variant.coords) board[(r + pt.y) * 5 + (c + pt.x)] = p;
                            finalPlacement[p] = { startR: r, startC: c, coords: variant.coords };

                            if (backtrack(index + 1)) return true;

                            for (const pt of variant.coords) board[(r + pt.y) * 5 + (c + pt.x)] = -1;
                        }
                    }
                    used[p] = false;
                }
                return false;
            }

            if (backtrack(0)) {
                for (let num = 1; num <= 5; num++) {
                    const boardIdx = mainBoardData.indexOf(num); 
                    const br = Math.floor(boardIdx / 5);
                    const bc = boardIdx % 5;
                    const pIdx = board[boardIdx]; 

                    const placement = finalPlacement[pIdx];
                    const matchedCoord = placement.coords.find(pt => {
                        return (placement.startR + pt.y === br) && (placement.startC + pt.x === bc);
                    });

                    if (matchedCoord) {
                        const origCellIdx = matchedCoord.origIdx;
                        const targetCell = document.querySelector(`.grid-piece[data-piece-idx="${pIdx}"] .cell[data-cell-idx="${origCellIdx}"]`);
                        if (targetCell) {
                            targetCell.classList.add('hit');
                            targetCell.innerText = num; 
                        }
                    }
                }
                updateUI();
            } else {
                alert("解が見つかりませんでした！ピースの形や向きを確認してください。");
            }
        }

        window.onload = init;
    </script>
</body>
</html>
